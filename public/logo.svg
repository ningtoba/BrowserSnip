<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0b10"/>
  <!-- Accent tint -->
  <rect width="64" height="64" rx="14" fill="#6366f1" fill-opacity="0.1"/>
  <!-- Ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Scissors icon -->
  <g transform="translate(14, 12)" fill="none" stroke="#a8adc4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left blade -->
    <path d="M18 4L6 20"/>
    <!-- Right blade -->
    <path d="M6 4L18 20"/>
    <!-- Left loop -->
    <circle cx="6" cy="6" r="4" stroke="#eeeff5"/>
    <!-- Right loop -->
    <circle cx="18" cy="6" r="4" stroke="#eeeff5"/>
    <!-- Pivot -->
    <circle cx="12" cy="12" r="1.5" fill="#6366f1" stroke="none"/>
  </g>
</svg>
